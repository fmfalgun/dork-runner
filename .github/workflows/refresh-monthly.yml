name: Monthly Demo Refresh

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Wayback CDX for nmap.org
        run: |
          curl -sf "https://web.archive.org/cdx/search/cdx?url=*.nmap.org&output=json&limit=50&fl=original,statuscode,timestamp&collapse=urlkey&filter=statuscode:200" \
            -o /tmp/wayback.json || echo '[]' > /tmp/wayback.json

      - name: Fetch GitHub code search for nmap.org
        run: |
          curl -sf -H "Accept: application/vnd.github+json" \
            "https://api.github.com/search/code?q=%22nmap.org%22&per_page=10" \
            -o /tmp/github.json || echo '{"total_count":0,"items":[]}' > /tmp/github.json

      - name: Fetch crt.sh for nmap.org
        run: |
          curl -sf "https://crt.sh/?q=%25.nmap.org&output=json" -o /tmp/crtsh.json || echo '[]' > /tmp/crtsh.json

      - name: Build demo JSON
        run: |
          python3 - << 'PYEOF'
          import json, datetime, os

          with open('/tmp/wayback.json') as f:
            wb = json.load(f)
          wb_entries = wb[1:11] if isinstance(wb, list) and len(wb) > 1 else []

          with open('/tmp/github.json') as f:
            gh = json.load(f)

          with open('/tmp/crtsh.json') as f:
            ct = json.load(f)
          names = sorted(set(e['name_value'] for e in ct))[:20] if ct else []

          result = {
            "domain": "nmap.org",
            "generated_at": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            "wayback": {
              "count": len(wb) - 1 if isinstance(wb, list) and len(wb) > 1 else 0,
              "entries": wb_entries
            },
            "github": {
              "total_count": gh.get("total_count", 0),
              "items": [
                {"name": i["name"], "repository": i["repository"]["full_name"], "html_url": i["html_url"]}
                for i in gh.get("items", [])[:5]
              ]
            },
            "crtsh": {"count": len(names), "names": names}
          }

          os.makedirs("web/data/demo", exist_ok=True)
          with open("web/data/demo/nmap.org.json", "w") as f:
            json.dump(result, f, indent=2)
          print(f"Refreshed: {result['generated_at']} — {result['wayback']['count']} wayback, {result['github']['total_count']} github, {result['crtsh']['count']} certs")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/demo/
          git diff --staged --quiet || git commit -m "data: monthly demo refresh [skip ci]"
          git push
